<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>GitHub 專案列表</title>
  <style>
    body { max-width: 700px; margin: 40px auto; font-family: Arial; }
    li { margin: 6px 0; }
  </style>
</head>
<body>

<h2>GitHub 專案列表（自動同步）</h2>

<ul id="list"></ul>

<script>
const USER = "fd159-hub";

async function loadRepos() {
  const res = await fetch(`https://api.github.com/users/${USER}/repos`);
  const repos = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  repos.forEach(repo => {
    // 只顯示有 GitHub Pages 的 repo（可選）
    // if (!repo.has_pages) return;
repos.forEach(repo => {

  // ❌ 排除主頁 repo
  if (repo.name === "fd159-hub.github.io") return;

  const url = `https://${USER}.github.io/${repo.name}/`;

  const li = document.createElement("li");
  const a = document.createElement("a");

  a.href = url;
  a.textContent = repo.description || repo.name;
  a.target = "_blank";

  li.appendChild(a);
  list.appendChild(li);
});
    const url = `https://${USER}.github.io/${repo.name}/`;

    const li = document.createElement("li");
    const a = document.createElement("a");

    a.href = url;
    a.textContent = repo.description || repo.name;
    a.target = "_blank";

    li.appendChild(a);
    list.appendChild(li);
  });
}

loadRepos();
</script>

</body>
</html>
